
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术学习路线思维导图</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/mindmap.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 技术学习路线思维导图</h1>
            <p class="subtitle">从基础运维开发到 AI 的完整学习路径</p>
            <div class="controls">
                <button onclick="zoomIn()" class="control-btn">🔍 放大</button>
                <button onclick="zoomOut()" class="control-btn">🔍 缩小</button>
                <button onclick="resetView()" class="control-btn">🔄 重置</button>
                <button onclick="exportImage()" class="control-btn">📷 导出图片</button>
                <button onclick="exportPDF()" class="control-btn">📄 导出 PDF</button>
            </div>
        </header>

        <main>
            <div id="mindmap-container">
                <svg id="mindmap" width="100%" height="800"></svg>
            </div>
        </main>

        <section class="progress-section">
            <h2>📊 学习进度追踪</h2>
            <div id="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="overall-progress"></div>
                </div>
                <p id="progress-text">总进度：0%</p>
            </div>
            <div id="stage-progress"></div>
        </section>

        <section class="legend-section">
            <h2>📖 图例说明</h2>
            <div class="legend">
                <div class="legend-item">
                    <span class="legend-color stage-1"></span>
                    <span>基础运维开发阶段</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color stage-2"></span>
                    <span>开发技能阶段</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color stage-3"></span>
                    <span>云原生与 DevOps</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color stage-4"></span>
                    <span>AI/ML 进阶阶段</span>
                </div>
                <div class="legend-item">
                    <span class="legend-status completed"></span>
                    <span>已完成</span>
                </div>
                <div class="legend-item">
                    <span class="legend-status in-progress"></span>
                    <span>学习中</span>
                </div>
                <div class="legend-item">
                    <span class="legend-status not-started"></span>
                    <span>未开始</span>
                </div>
            </div>
        </section>

        <footer>
            <p>技术学习路线思维导图 | 帮助学习者清晰了解技术成长路径</p>
        </footer>
    </div>

    <!-- Modal for node details -->
    <div id="node-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title"></h2>
            <div id="modal-body"></div>
            <div class="modal-actions">
                <button onclick="markAsComplete()" class="action-btn complete">✅ 标记为完成</button>
                <button onclick="markAsInProgress()" class="action-btn in-progress">📚 标记为学习中</button>
                <button onclick="markAsNotStarted()" class="action-btn not-started">⏸️ 标记为未开始</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // Mind map data structure
        const mindMapData = {
            id: 'root',
            name: '技术学习路线',
            stage: 0,
            description: '从基础运维开发到 AI 的完整学习路径',
            children: [
                {
                    id: 'stage1',
                    name: '基础运维开发阶段',
                    stage: 1,
                    description: '掌握基础运维和开发技能',
                    children: [
                        { id: 'linux', name: 'Linux/Unix 系统基础', stage: 1, description: '学习 Linux/Unix 操作系统基础' },
                        { id: 'network', name: '网络基础', stage: 1, description: 'TCP/IP, HTTP, DNS 等网络协议' },
                        { id: 'shell', name: 'Shell 脚本编程', stage: 1, description: 'Bash 脚本编写和自动化' },
                        { id: 'git', name: 'Git 版本控制', stage: 1, description: '代码版本管理和协作' },
                        { id: 'docker', name: '基础容器技术', stage: 1, description: 'Docker 容器化技术' }
                    ]
                },
                {
                    id: 'stage2',
                    name: '开发技能阶段',
                    stage: 2,
                    description: '提升编程和开发能力',
                    children: [
                        { id: 'programming', name: '编程语言', stage: 2, description: 'Python/Go/Node.js 等编程语言' },
                        { id: 'web', name: 'Web 开发基础', stage: 2, description: '前端和后端 Web 开发' },
                        { id: 'database', name: '数据库基础', stage: 2, description: 'SQL/NoSQL 数据库' },
                        { id: 'api', name: 'API 设计与开发', stage: 2, description: 'RESTful API 设计' },
                        { id: 'cicd', name: 'CI/CD 流程', stage: 2, description: '持续集成和持续部署' }
                    ]
                },
                {
                    id: 'stage3',
                    name: '云原生与 DevOps',
                    stage: 3,
                    description: '云原生技术和 DevOps 实践',
                    children: [
                        { id: 'k8s', name: 'Kubernetes', stage: 3, description: '容器编排平台' },
                        { id: 'cloud', name: '云服务', stage: 3, description: 'AWS/Azure/GCP 云平台' },
                        { id: 'monitoring', name: '监控与日志', stage: 3, description: '系统监控和日志管理' },
                        { id: 'terraform', name: '基础设施即代码', stage: 3, description: 'Terraform 等 IaC 工具' }
                    ]
                },
                {
                    id: 'stage4',
                    name: 'AI/ML 进阶阶段',
                    stage: 4,
                    description: '人工智能和机器学习',
                    children: [
                        { id: 'ml', name: '机器学习基础', stage: 4, description: '机器学习算法和理论' },
                        { id: 'dl', name: '深度学习框架', stage: 4, description: 'TensorFlow/PyTorch 等框架' },
                        { id: 'llm', name: 'LLM 应用开发', stage: 4, description: '大语言模型应用开发' },
                        { id: 'aieng', name: 'AI 工程化实践', stage: 4, description: 'AI 系统部署和优化' }
                    ]
                }
            ]
        };

        let currentNode = null;
        let currentZoom = 1;
        let nodeStatuses = {};

        // Load progress from localStorage
        function loadProgress() {
            const saved = localStorage.getItem('mindmapProgress');
            if (saved) {
                nodeStatuses = JSON.parse(saved);
            }
        }

        // Save progress to localStorage
        function saveProgress() {
            localStorage.setItem('mindmapProgress', JSON.stringify(nodeStatuses));
        }

        // Get node status
        function getNodeStatus(nodeId) {
            return nodeStatuses[nodeId] || 'not-started';
        }

        // Set node status
        function setNodeStatus(nodeId, status) {
            nodeStatuses[nodeId] = status;
            saveProgress();
            renderMindMap();
            updateProgressDisplay();
        }

        // Get color by stage
        function getStageColor(stage) {
            const colors = {
                0: '#2c3e50',
                1: '#3498db',
                2: '#9b59b6',
                3: '#e67e22',
                4: '#e74c3c'
            };
            return colors[stage] || '#95a5a6';
        }

        // Get status color
        function getStatusColor(status) {
            const colors = {
                'completed': '#27ae60',
                'in-progress': '#f39c12',
                'not-started': '#bdc3c7'
            };
            return colors[status] || '#bdc3c7';
        }

        // Create SVG node
        function createNode(data, x, y, width, height, group) {
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('transform', `translate(${x}, ${y})`);
            g.style.cursor = 'pointer';
            g.onclick = () => showNodeDetails(data);

            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('width', width);
            rect.setAttribute('height', height);
            rect.setAttribute('rx', 8);
            rect.setAttribute('ry', 8);
            rect.setAttribute('fill', getStageColor(data.stage));
            rect.setAttribute('stroke', '#fff');
            rect.setAttribute('stroke-width', '2');

            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', width / 2);
            text.setAttribute('y', height / 2 + 5);
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('fill', '#fff');
            text.setAttribute('font-size', '12');
            text.setAttribute('font-weight', 'bold');
            text.textContent = data.name.length > 10 ? data.name.substring(0, 10) + '...' : data.name;

            const status = getNodeStatus(data.id);
            const statusColor = getStatusColor(status);
            const statusCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            statusCircle.setAttribute('cx', width - 15);
            statusCircle.setAttribute('cy', 15);
            statusCircle.setAttribute('r', 8);
            statusCircle.setAttribute('fill', statusColor);
            statusCircle.setAttribute('stroke', '#fff');
            statusCircle.setAttribute('stroke-width', '2');

            g.appendChild(rect);
            g.appendChild(text);
            g.appendChild(statusCircle);
            group.appendChild(g);
        }

        // Render mind map recursively
        function renderMindMap() {
            const svg = document.getElementById('mindmap');
            svg.innerHTML = '';

            const containerWidth = svg.clientWidth || 1200;
            const startY = 50;
            const nodeWidth = 150;
            const nodeHeight = 60;
            const levelHeight = 100;

            // Create main group for transformations
            const mainGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            mainGroup.setAttribute('transform', `translate(${containerWidth / 2 - nodeWidth / 2}, 0)`);
            svg.appendChild(mainGroup);

            // Render root node
            createNode(mindMapData, 0, startY, nodeWidth, nodeHeight, mainGroup);

            // Render children
            let childIndex = 0;
            mindMapData.children.forEach(stage => {
                const childX = (childIndex - mindMapData.children.length / 2 + 0.5) * (nodeWidth + 80);
                const childY = startY + levelHeight;

                // Draw connection line
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const startX = nodeWidth / 2;
                const endX = childX + nodeWidth / 2;
                const pathData = `M ${startX} ${startY + nodeHeight} L ${startX} ${startY + nodeHeight + 30} L ${endX} ${startY + nodeHeight + 30} L ${endX} ${childY}`;
                line.setAttribute('d', pathData);
                line.setAttribute('stroke', getStageColor(stage.stage));
                line.setAttribute('stroke-width', '3');
                line.setAttribute('fill', 'none');
                mainGroup.appendChild(line);

                // Create child node
                createNode(stage, childX, childY, nodeWidth, nodeHeight, mainGroup);

                // Render grandchildren
                if (stage.children) {
                    const grandchildY = childY + levelHeight;
                    const grandchildSpacing = (nodeWidth + 40);
                    const totalWidth = (stage.children.length - 1) * grandchildSpacing;
                    const startGrandchildX = childX - totalWidth / 2;

                    stage.children.forEach((grandchild, gcIndex) => {
                        const gcX = startGrandchildX + gcIndex * grandchildSpacing;

                        // Draw connection line
                        const gcLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        const gcStartX = childX + nodeWidth / 2;
                        const gcEndX = gcX + nodeWidth / 2;
                        const gcPathData = `M ${gcStartX} ${childY + nodeHeight} L ${gcStartX} ${childY + nodeHeight + 30} L ${gcEndX} ${childY + nodeHeight + 30} L ${gcEndX} ${grandchildY}`;
                        gcLine.setAttribute('d', gcPathData);
                        gcLine.setAttribute('stroke', getStageColor(grandchild.stage));
                        gcLine.setAttribute('stroke-width', '2');
                        gcLine.setAttribute('fill', 'none');
                        gcLine.setAttribute('stroke-dasharray', '5,5');
                        mainGroup.appendChild(gcLine);

                        // Create grandchild node
                        createNode(grandchild, gcX, grandchildY, nodeWidth, nodeHeight, mainGroup);
                    });
                }

                childIndex++;
            });

            // Set SVG height based on content
            svg.setAttribute('height', startY + levelHeight * 2 + nodeHeight + 50);
        }

        // Update progress display
        function updateProgressDisplay() {
            let totalNodes = 0;
            let completedNodes = 0;
            let inProgressNodes = 0;

            function countNodes(node) {
                totalNodes++;
                const status = getNodeStatus(node.id);
                if (status === 'completed') completedNodes++;
                else if (status === 'in-progress') inProgressNodes++;

                if (node.children) {
                    node.children.forEach(countNodes);
                }
            }

            countNodes(mindMapData);

            const percentage = Math.round((completedNodes / totalNodes) * 100);
            document.getElementById('overall-progress').style.width = percentage + '%';
            document.getElementById('progress-text').textContent = `总进度：${percentage}% (${completedNodes}/${totalNodes})`;

            // Update stage progress
            const stageProgressDiv = document.getElementById('stage-progress');
            stageProgressDiv.innerHTML = '';

            mindMapData.children.forEach(stage => {
                let stageTotal = 1;
                let stageCompleted = 0;

                if (stage.children) {
                    stageTotal += stage.children.length;
                    stage.children.forEach(child => {
                        if (getNodeStatus(child.id) === 'completed') stageCompleted++;
                    });
                }

                if (getNodeStatus(stage.id) === 'completed') stageCompleted++;

                const stagePercentage = Math.round((stageCompleted / stageTotal) * 100);

                const stageDiv = document.createElement('div');
                stageDiv.className = 'stage-progress';
                stageDiv.innerHTML = `
                    <div class="stage-name">${stage.name}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${stagePercentage}%"></div>
                    </div>
                    <div class="stage-percentage">${stagePercentage}%</div>
                `;
                stageProgressDiv.appendChild(stageDiv);
            });
        }

        // Show node details modal
        function showNodeDetails(data) {
            currentNode = data;
            document.getElementById('modal-title').textContent = data.name;

            let content = `<p><strong>描述：</strong>${data.description || '暂无描述'}</p>`;

            if (data.resources && data.resources.length > 0) {
                content += '<p><strong>推荐资源：</strong></p><ul>';
                data.resources.forEach(resource => {
                    content += `<li>${resource}</li>`;
                });
                content += '</ul>';
            }

            const status = getNodeStatus(data.id);
            content += `<p><strong>当前状态：</strong><span class="status-${status}">${getStatusText(status)}</span></p>`;

            document.getElementById('modal-body').innerHTML = content;
            document.getElementById('node-modal').style.display = 'block';
        }

        // Get status text
        function getStatusText(status) {
            const texts = {
                'completed': '已完成',
                'in-progress': '学习中',
                'not-started': '未开始'
            };
            return texts[status] || status;
        }

        // Close modal
        function closeModal() {
            document.getElementById('node-modal').style.display = 'none';
        }

        // Mark node as complete
        function markAsComplete() {
            if (currentNode) {
                setNodeStatus(currentNode.id, 'completed');
                closeModal();
            }
        }

        // Mark node as in progress
        function markAsInProgress() {
            if (currentNode) {
                setNodeStatus(currentNode.id, 'in-progress');
                closeModal();
            }
        }

        // Mark node as not started
        function markAsNotStarted() {
            if (currentNode) {
                setNodeStatus(currentNode.id, 'not-started');
                closeModal();
            }
        }

        // Zoom functions
        function zoomIn() {
            currentZoom = Math.min(currentZoom + 0.2, 2);
            const svg = document.getElementById('mindmap');
            const mainGroup = svg.querySelector('g');
            if (mainGroup) {
                mainGroup.setAttribute('transform', `scale(${currentZoom})`);
            }
        }

        function zoomOut() {
            currentZoom = Math.max(currentZoom - 0.2, 0.6);
            const svg = document.getElementById('mindmap');
            const mainGroup = svg.querySelector('g');
            if (mainGroup) {
                mainGroup.setAttribute('transform', `scale(${currentZoom})`);
            }
        }

        function resetView() {
            currentZoom = 1;
            const svg = document.getElementById('mindmap');
            const mainGroup = svg.querySelector('g');
            if (mainGroup) {
                mainGroup.setAttribute('transform', 'scale(1)');
            }
        }

        // Export functions
        function exportImage() {
            const container = document.getElementById('mindmap-container');
            html2canvas(container).then(canvas => {
                const link = document.createElement('a');
                link.download = '技术学习路线思维导图.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function exportPDF() {
            const container = document.getElementById('mindmap-container');
            html2canvas(container).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('landscape', 'px', 'a4');
                const imgWidth = pdf.internal.pageSize.getWidth() - 40;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 20, 20, imgWidth, imgHeight);
                pdf.save('技术学习路线思维导图.pdf');
            });
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('node-modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Initialize
        loadProgress();
        renderMindMap();
        updateProgressDisplay();

        // Re-render on window resize
        window.addEventListener('resize', renderMindMap);
    </script>
</body>
</html>
