<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI DevOps Pro{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style-pro.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖⚙️</text></svg>">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'components/navbar-pro.html' %}
    
    <main class="main-content-pro">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="footer-pro">
        <p>AI DevOps Pro - Your Path to Excellence</p>
        <p>© 2025 AI DevOps Pro. All rights reserved.</p>
    </footer>
    
    <script>
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            
            const moonIcon = document.querySelector('.icon-moon');
            const sunIcon = document.querySelector('.icon-sun');
            
            if (newTheme === 'light') {
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            } else {
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            }
            
            localStorage.setItem('theme', newTheme);
        }

        // Search function
        function handleSearch() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                window.location.href = `/search?q=${encodeURIComponent(query)}`;
            }
        }

        // Load saved theme
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const html = document.documentElement;
            html.setAttribute('data-theme', savedTheme);
            
            const moonIcon = document.querySelector('.icon-moon');
            const sunIcon = document.querySelector('.icon-sun');
            
            if (savedTheme === 'dark') {
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            }
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
