name: Resolve Issue with OpenHands

on:
  issues:
    types: [labeled, reopened, opened]
  pull_request:
    types: [labeled, reopened, opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-permissions:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Check if user has permission to trigger
        id: check
        run: |
          AUTHOR_ASSOCIATION="${{ github.event.issue.user.author_association || github.event.pull_request.user.author_association || github.event.comment.author_association || github.event.review.author_association }}"
          if [[ "$AUTHOR_ASSOCIATION" == "OWNER" || "$AUTHOR_ASSOCIATION" == "COLLABORATOR" || "$AUTHOR_ASSOCIATION" == "MEMBER" || -z "$AUTHOR_ASSOCIATION" ]]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
          fi

  check-labels:
    needs: check-permissions
    if: needs.check-permissions.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    outputs:
      has-macro-label: ${{ steps.check-labels.outputs.has-macro-label }}
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check if issue/PR has fix-me label
        id: check-labels
        run: |
          echo "Event name: ${{ github.event_name }}"

          # For labeled event, check the added label directly
          if [ "${{ github.event_name }}" = "labeled" ]; then
            LABEL_NAME="${{ github.event.label.name }}"
            echo "Labeled event, label name: $LABEL_NAME"
            if [ "$LABEL_NAME" = "fix-me" ] || [ "$LABEL_NAME" = "fix-me-experimental" ]; then
              echo "has-macro-label=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # For opened/reopened events, github.event.issue.labels should be available
          if [ "${{ github.event_name }}" = "opened" ] || [ "${{ github.event_name }}" = "reopened" ]; then
            LABELS_JSON='${{ toJSON(github.event.issue.labels) }}'
            echo "Opened event, labels JSON: $LABELS_JSON"
            if echo "$LABELS_JSON" | jq -e '.[] | select(.name == "fix-me" or .name == "fix-me-experimental")' > /dev/null 2>&1; then
              echo "has-macro-label=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # For PR events
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LABELS_JSON='${{ toJSON(github.event.pull_request.labels) }}'
            echo "PR event, labels JSON: $LABELS_JSON"
            if echo "$LABELS_JSON" | jq -e '.[] | select(.name == "fix-me" or .name == "fix-me-experimental")' > /dev/null 2>&1; then
              echo "has-macro-label=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "has-macro-label=false" >> $GITHUB_OUTPUT

  setup-repository:
    needs: [check-permissions, check-labels]
    if: needs.check-labels.outputs.has-macro-label == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

  call-openhands-resolver:
    needs: [check-permissions, check-labels, setup-repository]
    if: success()
    uses: OpenHands/OpenHands/.github/workflows/openhands-resolver.yml@main
    with:
      macro: ${{ vars.OPENHANDS_MACRO || '@openhands-agent' }}
      max_iterations: ${{ fromJson(vars.OPENHANDS_MAX_ITER || 50) }}
      base_container_image: ${{ vars.OPENHANDS_BASE_CONTAINER_IMAGE || '' }}
      LLM_MODEL: ${{ vars.LLM_MODEL || 'openai/qwen3.5-plus' }}
      target_branch: ${{ vars.TARGET_BRANCH || 'main' }}
      runner: ${{ vars.TARGET_RUNNER }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      PAT_USERNAME: ${{ secrets.PAT_USERNAME }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
