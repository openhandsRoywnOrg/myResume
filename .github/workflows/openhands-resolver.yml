name: Forward to OpenHands Server

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  forward-event:
    runs-on: ubuntu-latest
    steps:
      - name: Forward to自建 Webhook 服务器
        env:
          WEBHOOK_URL: ${{ secrets.OPENHANDS_SERVER_URL }}
          WEBHOOK_SECRET: ${{ secrets.OPENHANDS_WEBHOOK_SECRET }}
          GITHUB_EVENT: ${{ github.event_name }}
          GITHUB_PAYLOAD: ${{ toJSON(github.event) }}
        run: |
          curl -X POST "$WEBHOOK_URL/webhook/github" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: $GITHUB_EVENT" \
            -d "$GITHUB_PAYLOAD"
